{{/*
=============================================================================
CertiVault — Deployments (backend, frontend, workers)
Three Deployment objects in one file, separated by ---
=============================================================================
*/}}

# ── Backend API Deployment ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certivault.fullname" . }}-backend
  namespace: {{ include "certivault.namespace" . }}
  labels:
    {{- include "certivault.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      {{- include "certivault.componentSelectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "certivault.componentSelectorLabels" (dict "root" . "component" "backend") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- include "certivault.podSecurityContext" . | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds.backend }}
      containers:
        - name: backend
          image: {{ include "certivault.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.backend.port }}
              protocol: TCP
          envFrom:
            {{- include "certivault.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.backend.liveness.path }}
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: {{ .Values.probes.backend.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.backend.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.backend.liveness.failureThreshold }}
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.backend.readiness.path }}
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: {{ .Values.probes.backend.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.backend.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.backend.readiness.failureThreshold }}
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: {{ .Values.probes.backend.liveness.path }}
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "certivault.componentSelectorLabels" (dict "root" . "component" "backend") | nindent 14 }}

---
# ── Frontend Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certivault.fullname" . }}-frontend
  namespace: {{ include "certivault.namespace" . }}
  labels:
    {{- include "certivault.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      {{- include "certivault.componentSelectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "certivault.componentSelectorLabels" (dict "root" . "component" "frontend") | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds.frontend }}
      containers:
        - name: frontend
          image: {{ include "certivault.frontendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.frontend.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.frontend.liveness.path }}
              port: {{ .Values.service.frontend.port }}
            initialDelaySeconds: {{ .Values.probes.frontend.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.frontend.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.frontend.liveness.failureThreshold }}
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.frontend.readiness.path }}
              port: {{ .Values.service.frontend.port }}
            initialDelaySeconds: {{ .Values.probes.frontend.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.frontend.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.frontend.readiness.failureThreshold }}
            timeoutSeconds: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "certivault.componentSelectorLabels" (dict "root" . "component" "frontend") | nindent 14 }}

---
# ── Workers Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certivault.fullname" . }}-workers
  namespace: {{ include "certivault.namespace" . }}
  labels:
    {{- include "certivault.labels" . | nindent 4 }}
    app.kubernetes.io/component: workers
spec:
  replicas: {{ .Values.replicaCount.workers }}
  selector:
    matchLabels:
      {{- include "certivault.componentSelectorLabels" (dict "root" . "component" "workers") | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "certivault.componentSelectorLabels" (dict "root" . "component" "workers") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- include "certivault.podSecurityContext" . | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds.workers }}
      containers:
        - name: workers
          image: {{ include "certivault.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/workers/index.js"]
          envFrom:
            {{- include "certivault.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.workers | nindent 12 }}
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          emptyDir: {}
