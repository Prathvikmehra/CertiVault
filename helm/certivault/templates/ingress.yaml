{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "certivault.fullname" . }}-ingress
  namespace: {{ include "certivault.namespace" . }}
  labels:
    {{- include "certivault.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "certivault.fullname" . }}-backend
                port:
                  number: {{ .Values.service.backend.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "certivault.fullname" . }}-backend
                port:
                  number: {{ .Values.service.backend.port }}
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: {{ include "certivault.fullname" . }}-backend
                port:
                  number: {{ .Values.service.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "certivault.fullname" . }}-frontend
                port:
                  number: {{ .Values.service.frontend.port }}
{{- end }}
