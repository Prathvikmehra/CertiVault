apiVersion: v1
kind: Secret
metadata:
  name: {{ include "certivault.secretName" . }}
  namespace: {{ include "certivault.namespace" . }}
  labels:
    {{- include "certivault.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
  annotations:
    # Helm will not diff secret values in helm diff output for security
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
