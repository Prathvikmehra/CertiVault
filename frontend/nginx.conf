# =============================================================================
# CertiVault — Nginx Configuration
# Serves the React SPA and proxies /api requests to the backend container
# =============================================================================

server {
    listen 80;
    server_name _;

    # ── Root & index ────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Static asset caching (JS, CSS, images, fonts) ───────────────────────
    # Vite fingerprints filenames with a content hash, so 1-year cache is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Never cache index.html ───────────────────────────────────────────────
    # The HTML shell is tiny; always fetch fresh so cache-busted assets load
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # ── API proxy ────────────────────────────────────────────────────────────
    # Forward all /api/* and /health/* requests to the backend container.
    # In docker-compose the backend service is named "backend".
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;

        # Required for keep-alive connections
        proxy_set_header   Connection         "";

        # Pass real client information to Express
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Timeouts — generous for file upload/download
        proxy_connect_timeout  60s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;

        # Allow large file uploads (must match backend limit of 10 MB)
        client_max_body_size   15m;
    }

    # Forward /health/* to backend as well (Docker / k8s probes)
    location /health/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        access_log off;
    }

    # Forward /admin/queues to backend (Bull Board)
    location /admin/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
    }

    # ── React Router (SPA fallback) ──────────────────────────────────────────
    # Any route not matched above (e.g. /dashboard, /vault/members) must
    # return index.html so React Router can handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Error pages ─────────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
