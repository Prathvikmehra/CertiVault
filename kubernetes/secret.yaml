# =============================================================================
# CertiVault — Secret  (sensitive environment variables)
# =============================================================================
# IMPORTANT: This file contains PLACEHOLDER base64 values.
# Replace each value with:   echo -n "your-real-value" | base64
#
# Never commit real secrets to git.
# In production use:
#   - AWS Secrets Manager + External Secrets Operator, OR
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets), OR
#   - kubectl create secret generic certivault-secrets --from-env-file=.env
#
# All values below are base64-encoded placeholders (decoded = "REPLACE_ME")
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: certivault-secrets
  namespace: certivault
  labels:
    app.kubernetes.io/name: certivault
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # ── MongoDB ───────────────────────────────────────────────────────────────
  # echo -n "mongodb+srv://user:pass@cluster.mongodb.net/certivault" | base64
  MONGO_URI: "UkVQTEFDRV9NRQ=="

  # ── JWT Secrets (minimum 32 characters each) ──────────────────────────────
  # echo -n "your-64-char-access-secret-here-make-it-long-and-random" | base64
  JWT_ACCESS_SECRET: "UkVQTEFDRV9NRQ=="
  # echo -n "your-64-char-refresh-secret-here-make-it-long-and-random" | base64
  JWT_REFRESH_SECRET: "UkVQTEFDRV9NRQ=="

  # ── Redis ─────────────────────────────────────────────────────────────────
  # echo -n "redis://:<password>@certivault-redis-master:6379" | base64
  REDIS_URL: "UkVQTEFDRV9NRQ=="
  REDIS_PASSWORD: "UkVQTEFDRV9NRQ=="

  # ── AWS ───────────────────────────────────────────────────────────────────
  AWS_ACCESS_KEY_ID: "UkVQTEFDRV9NRQ=="
  AWS_SECRET_ACCESS_KEY: "UkVQTEFDRV9NRQ=="

  # ── Email / SMTP ──────────────────────────────────────────────────────────
  SMTP_USER: "UkVQTEFDRV9NRQ=="
  SMTP_PASS: "UkVQTEFDRV9NRQ=="

  # ── Google OAuth ──────────────────────────────────────────────────────────
  GOOGLE_CLIENT_ID: "UkVQTEFDRV9NRQ=="
  GOOGLE_CLIENT_SECRET: "UkVQTEFDRV9NRQ=="

  # ── Bull Board ────────────────────────────────────────────────────────────
  BULL_BOARD_USERNAME: "YWRtaW4="
  BULL_BOARD_PASSWORD: "UkVQTEFDRV9NRQ=="
