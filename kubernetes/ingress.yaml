# =============================================================================
# CertiVault — Nginx Ingress + TLS
# =============================================================================
# Prerequisites:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/aws/deploy.yaml
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.5/cert-manager.yaml
#
# cert-manager ClusterIssuer for Let's Encrypt must exist — see below.
# Update spec.tls[0].hosts and spec.rules[0].host to your real domain.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: certivault-ingress
  namespace: certivault
  labels:
    app.kubernetes.io/name: certivault
    app.kubernetes.io/component: ingress
  annotations:
    # ── Ingress class ──────────────────────────────────────────────────────
    kubernetes.io/ingress.class: "nginx"

    # ── TLS / cert-manager ────────────────────────────────────────────────
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # ── Nginx tuning ──────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"

    # Enable gzip at the ingress level (Nginx already does it inside the
    # frontend container, but this also covers API responses)
    nginx.ingress.kubernetes.io/enable-cors: "false"   # CORS handled by Express

    # Force HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Preserve real client IP for rate-limiting and logging
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - certivault.example.com        # ← replace with your domain
        - api.certivault.example.com    # ← replace (or remove if using path routing)
      secretName: certivault-tls        # cert-manager will populate this secret

  rules:
    # ── API traffic → backend service ──────────────────────────────────────
    - host: certivault.example.com      # ← replace with your domain
      http:
        paths:
          # API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: certivault-backend
                port:
                  number: 5000
          # Health probes (used by external monitors)
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: certivault-backend
                port:
                  number: 5000
          # Bull Board admin UI
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: certivault-backend
                port:
                  number: 5000
          # Frontend SPA — must be last (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: certivault-frontend
                port:
                  number: 80

---
# =============================================================================
# Let's Encrypt ClusterIssuer (cert-manager)
# Apply this once per cluster — not per namespace.
# =============================================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/name: certivault
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@certivault.example.com   # ← replace with your email
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
