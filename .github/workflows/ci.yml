name: CI

on:
  pull_request:
    branches: [main, ecsoc-2026]
  push:
    branches: [main, ecsoc-2026]
  merge_group:

permissions:
  contents: read

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test
      - run: npm run typecheck --if-present
      - run: npm run build --if-present

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test --if-present
      - run: npm run build

  docker:
    name: Docker build compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images when Dockerfiles exist
        shell: bash
        run: |
          shopt -s globstar nullglob
          dockerfiles=(**/Dockerfile)
          if [ ${#dockerfiles[@]} -eq 0 ]; then
            echo "No Dockerfiles are present yet; skipping optional Docker build."
            exit 0
          fi
          for file in "${dockerfiles[@]}"; do
            docker build -t "certivault-$(dirname "$file" | tr '/.' '--'):ci" "$(dirname "$file")"
          done
