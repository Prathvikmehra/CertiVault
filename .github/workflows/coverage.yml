name: Code coverage

on:
  pull_request:
    branches: [main, ecsoc-2026]
  push:
    branches: [main, ecsoc-2026]

permissions:
  contents: read

jobs:
  backend-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run Node coverage
        run: node --test --experimental-test-coverage
      - name: Upload coverage when lcov exists
        if: hashFiles('backend/coverage/lcov.info') != ''
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
