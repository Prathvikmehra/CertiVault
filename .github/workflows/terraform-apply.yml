# =============================================================================
# CertiVault — Terraform Apply (on push to main)
# =============================================================================
# Applies the Terraform plan ONLY after code lands on main AND the push
# touched files under terraform/.
# Last triggered: 2026-07-19 — force fresh run after re-run loop on stale SHA
#
# ── Required GitHub Repository Secrets ───────────────────────────────────────
# Configure these at: Settings → Secrets and variables → Actions → New secret
#
#   AWS_ACCESS_KEY_ID         → IAM user access key with Terraform permissions
#   AWS_SECRET_ACCESS_KEY     → IAM user secret access key
#   AWS_REGION                → AWS region (e.g. ap-south-1)
#                               NOTE: currently hardcoded to ap-south-1 in the
#                               workflow env block; set this secret if you want
#                               to make it configurable.
#
# ── S3 Backend Secrets (if overriding backend.tf values via CI) ───────────────
# These are NOT required if backend.tf already contains the hard-coded bucket
# and table names (which it does for this project). They are documented here
# for teams that prefer to pass backend config dynamically:
#
#   TF_STATE_BUCKET           → S3 bucket name for remote state
#                               (default: certivault-terraform-state)
#   TF_LOCK_TABLE             → DynamoDB table name for state locking
#                               (default: certivault-terraform-locks)
#
# ── IAM Permissions Required ─────────────────────────────────────────────────
# The IAM user/role must have at minimum:
#   - AmazonEC2FullAccess (VPC, subnets, security groups)
#   - AmazonEKSFullAccess
#   - AmazonElastiCacheFullAccess
#   - AmazonS3FullAccess (state bucket + document bucket)
#   - AmazonDynamoDBFullAccess (state lock table)
#   - AmazonECRFullAccess
#   - IAMFullAccess (for EKS node role, OIDC provider)
#   - SecretsManagerFullAccess (for DocumentDB password)
#   - AmazonDocDBFullAccess
#
# ── Pre-requisites (one-time bootstrap) ──────────────────────────────────────
# The S3 backend bucket and DynamoDB lock table must exist before the first
# terraform init. See backend.tf for the aws CLI commands to create them.
#
# ── Safety features ──────────────────────────────────────────────────────────
#   - Skips gracefully (exit 0) when AWS credentials are not configured
#   - Runs a fresh plan first — never applies without it
#   - Uses -auto-approve only inside CI (TF_IN_AUTOMATION=true)
#   - On failure: outputs terraform state list to help diagnose drift
#   - Manual workflow_dispatch requires typing "APPLY" to confirm
# =============================================================================

name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type APPLY to confirm you want to apply Terraform changes"
        required: true

concurrency:
  # Never run two applies at the same time
  group: terraform-apply
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # for OIDC auth (future — when moving off long-lived keys)

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    # Block manual dispatch unless user typed APPLY
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'APPLY')

    defaults:
      run:
        working-directory: terraform

    env:
      TF_IN_AUTOMATION: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Guard: skip entire job if AWS credentials are not configured ─────────
      # Without this, terraform init produces a confusing "no valid credential
      # sources" error. Instead we exit 0 with a clear message so the job shows
      # as skipped rather than failed.
      - name: Check AWS credentials are configured
        id: check-creds
        shell: bash
        run: |
          if [[ -z "$AWS_ACCESS_KEY_ID" || -z "$AWS_SECRET_ACCESS_KEY" ]]; then
            echo "⚠️  AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY secret is not set."
            echo "   Add them in: Settings → Secrets and variables → Actions"
            echo "   Skipping Terraform Apply."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        if: steps.check-creds.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false   # raw output for apply (no wrapper wrapping)

      # ── Initialise ──────────────────────────────────────────────────────────
      # Backend config is fully defined in backend.tf — no -backend-config
      # overrides needed. Passing empty secrets as -backend-config args would
      # cause "bucket must not be empty" errors.
      # If the S3 backend bucket does not exist yet, init will fail — we catch
      # that and skip the rest of the job gracefully.
      - name: Terraform Init
        id: init
        if: steps.check-creds.outputs.skip != 'true'
        run: terraform init -reconfigure
        continue-on-error: true

      - name: Skip if backend unavailable
        if: steps.check-creds.outputs.skip != 'true' && steps.init.outcome != 'success'
        run: |
          echo "⚠️  terraform init failed — S3 backend may not exist yet." >> $GITHUB_STEP_SUMMARY
          echo "   Create the state bucket and DynamoDB table (see backend.tf)" >> $GITHUB_STEP_SUMMARY
          echo "   then re-run this workflow." >> $GITHUB_STEP_SUMMARY
          echo "backend_ready=false" >> $GITHUB_ENV

      # ── Validate before applying ────────────────────────────────────────────
      - name: Terraform Validate
        if: steps.check-creds.outputs.skip != 'true' && steps.init.outcome == 'success'
        run: terraform validate -no-color

      # ── Plan (fresh plan — never apply a stale one) ─────────────────────────
      - name: Terraform Plan
        id: plan
        if: steps.check-creds.outputs.skip != 'true' && steps.init.outcome == 'success'
        run: |
          set -o pipefail
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan.bin \
            -var="environment=production" \
            2>&1 | tee plan.txt

      # ── Show what will change ───────────────────────────────────────────────
      - name: Show plan summary
        if: steps.check-creds.outputs.skip != 'true' && steps.init.outcome == 'success'
        run: |
          echo "### Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          (grep -E '(Plan:|No changes|must be|will be)' plan.txt || true) >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── Apply ───────────────────────────────────────────────────────────────
      - name: Terraform Apply
        id: apply
        if: steps.check-creds.outputs.skip != 'true' && steps.init.outcome == 'success'
        run: |
          set -o pipefail
          terraform apply \
            -no-color \
            -input=false \
            -auto-approve \
            tfplan.bin \
            2>&1 | tee apply.txt

      # ── Capture outputs ─────────────────────────────────────────────────────
      - name: Terraform Output
        id: output
        if: steps.check-creds.outputs.skip != 'true' && steps.init.outcome == 'success' && steps.apply.outcome == 'success'
        run: terraform output -no-color -json | tee outputs.json
        continue-on-error: true

      # ── Upload outputs as artifact ──────────────────────────────────────────
      - name: Upload Terraform outputs
        uses: actions/upload-artifact@v4
        if: steps.check-creds.outputs.skip != 'true' && steps.output.outcome == 'success'
        with:
          name: terraform-outputs-${{ github.sha }}
          path: terraform/outputs.json
          retention-days: 30

      # ── Diagnose on failure ──────────────────────────────────────────────────
      - name: Show state on failure
        if: failure() && steps.check-creds.outputs.skip != 'true'
        run: |
          echo "Apply failed — current state:"
          terraform state list || true
          echo ""
          echo "Last 100 lines of apply output:"
          tail -100 apply.txt || true

      # ── Write summary ───────────────────────────────────────────────────────
      - name: Write apply summary
        if: always()
        run: |
          echo "## Terraform Apply Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.check-creds.outputs.skip }}" == "true" ]]; then
            echo "⚠️ **Skipped** — AWS credentials not configured." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          PLAN_STATUS="${{ steps.plan.outcome }}"
          APPLY_STATUS="${{ steps.apply.outcome }}"
          [[ "$PLAN_STATUS"  == "success" ]] && PLAN_ICON="✅"  || PLAN_ICON="❌ ($PLAN_STATUS)"
          [[ "$APPLY_STATUS" == "success" ]] && APPLY_ICON="✅" || APPLY_ICON="❌ ($APPLY_STATUS)"
          echo "| Plan  | $PLAN_ICON  |" >> $GITHUB_STEP_SUMMARY
          echo "| Apply | $APPLY_ICON |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          if [ -f outputs.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Key Outputs" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat outputs.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
