name: Thank merged PR contributors

on:
  pull_request_target:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  thank-contributor:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Post thank-you message
        uses: actions/github-script@v7
        with:
          script: |
            const contributor = context.payload.pull_request.user.login;
            const message = [
              `Thank you @${contributor} for your contribution to CertiVault! 🎉`,
              '',
              'Your pull request has been merged. We appreciate your time and effort in helping the project grow under **Elite Coders Summer of Code (ECSoC) 2026**.',
              '',
              'If you enjoyed contributing:',
              '- ⭐ [Star the CertiVault repository](https://github.com/Krishnx21/CertiVault)',
              '- 👤 [Follow the Project Admin, Krishna Kumar](https://github.com/Krishnx21)',
              '',
              'We look forward to your next contribution! 🚀'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
