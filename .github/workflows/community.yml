name: Community automation

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome-issue:
    name: Welcome first-time issue creators
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first CertiVault issue. A maintainer will triage it soon. Please make sure the template is complete and does not include secrets, private documents, tokens, or personal data.

  welcome-pr:
    name: Welcome first-time contributors
    if: github.event_name == 'pull_request_target' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            Welcome to CertiVault, and thank you for your first pull request. Please confirm it targets `ecsoc-2026`, links an assigned issue, and includes the exact commands you ran.

  thank-merged:
    name: Thank contributors after merge
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `Thanks @${pr.user.login} for improving CertiVault. Your contribution is now merged. Happy contributing!`
            });
