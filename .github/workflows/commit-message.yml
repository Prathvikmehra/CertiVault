name: Commit message validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, ecsoc-2026]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/github-script@v7
        with:
          script: |
            const {data: commits} = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });
            const conventional = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?: .{1,120}$/;
            const bad = commits
              .map((commit) => commit.commit.message.split("\n")[0])
              .filter((subject) => !conventional.test(subject) && !subject.startsWith("Merge "));
            if (bad.length) {
              core.setFailed(`Use Conventional Commits. Invalid subjects:\n- ${bad.join("\n- ")}`);
            }
