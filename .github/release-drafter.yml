name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: "\\<*_&"
categories:
  - title: "Breaking changes"
    labels:
      - breaking change
  - title: "Features"
    labels:
      - feature
      - enhancement
  - title: "Fixes"
    labels:
      - bug
  - title: "Security"
    labels:
      - security
  - title: "Documentation"
    labels:
      - documentation
  - title: "Maintenance"
    labels:
      - dependencies
      - devops
      - github
      - testing
exclude-labels:
  - duplicate
  - invalid
  - question
version-resolver:
  major:
    labels:
      - breaking change
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - security
      - dependencies
      - documentation
      - devops
  default: patch
template: |
  ## What's Changed

  $CHANGES

  ## Release Notes

  CertiVault follows Semantic Versioning. Review SECURITY.md before disclosing
  vulnerability details in public release notes.
