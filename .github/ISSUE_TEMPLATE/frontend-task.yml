name: "🎨 Frontend Task"
description: "Plan React UI, accessibility, or client-state work"
title: "[Frontend]: "
labels: ["frontend", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        ## Welcome to CertiVault
        Thank you for helping improve our secure document platform. Provide reproducible, security-conscious details and never include credentials, private documents, access tokens, or personal data.

        ECSoC contributors must request assignment before coding and target the `ecsoc-2026` branch.

  - type: dropdown
    id: project-area
    attributes:
      label: "🧭 Project Area"
      description: Select the primary area affected by this issue.
      options:
        - "Backend / API"
        - "Frontend / React"
        - "Authentication / RBAC"
        - "Database / MongoDB"
        - "Document storage / Cloud"
        - "Security / Compliance"
        - "DevOps / CI/CD"
        - "Testing / Quality"
        - "Documentation / Community"
        - "AI / OCR / Search"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: issue-summary
    attributes:
      label: "📝 Issue Summary and Problem Description"
      description: Explain the request, the underlying problem, and why it is important.
      placeholder: |
        Issue summary:
        Problem description:
        Why this is important:
        Who is affected:
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: "🔍 Current and Expected Behaviour"
      description: Contrast what happens now with the desired outcome.
      placeholder: |
        Current behaviour:
        Current result:

        Expected behaviour:
        Expected result:
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "🧩 Reproduction and Evidence"
      description: Provide safe reproduction steps and links to sanitized evidence. Use N/A when this is not a defect.
      placeholder: |
        Step 1:
        Step 2:
        Step 3:
        Step 4:

        Screenshots:
        Video (optional):
      render: shell
    validations:
      required: true

  - type: textarea
    id: affected-scope
    attributes:
      label: "🎯 Affected Scope"
      description: Identify the likely code and data impact.
      placeholder: |
        Affected files:
        Affected APIs:
        Affected components:
        Database changes required? (No / Yes / Unsure):
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "🖥 Environment"
      description: Provide versions relevant to reproducing or implementing this issue.
      placeholder: |
        Operating system:
        Browser and version:
        Node.js version:
        Package manager and version:
        Docker version:
        Deployment environment:
    validations:
      required: true

  - type: textarea
    id: solution-plan
    attributes:
      label: "💡 Solution, Alternatives, and Estimate"
      description: Suggest an approach without treating it as final until maintainer review.
      placeholder: |
        Priority (P0 Critical / P1 High / P2 Medium / P3 Low):
        Proposed solution:
        Alternative solutions:
        Difficulty (Beginner / Intermediate / Advanced):
        Estimated time:
        Dependencies or blockers:
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "✅ Acceptance Criteria and Additional Notes"
      description: Define observable completion conditions using a Markdown checklist.
      placeholder: |
        - [ ] Requirement one
        - [ ] Requirement two
        - [ ] Automated tests added or updated
        - [ ] Documentation updated where necessary

        Additional notes:
    validations:
      required: true

  - type: checkboxes
    id: contributor-checklist
    attributes:
      label: "🤝 Contributor Checklist"
      description: Confirm each item before submitting.
      options:
        - label: "I have searched existing issues and pull requests for duplicates."
          required: true
        - label: "I can reproduce the issue, or I have clearly explained why reproduction is not applicable."
          required: true
        - label: "I will follow the contribution guidelines and target `ecsoc-2026`."
          required: true
        - label: "I agree to follow the Code of Conduct."
          required: true
        - label: "I have removed secrets, private documents, and personal data."
          required: true
