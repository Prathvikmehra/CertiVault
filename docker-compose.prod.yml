# =============================================================================
# CertiVault — docker-compose.prod.yml  (production overrides)
# =============================================================================
# This file extends docker-compose.yml with production-specific settings.
# Always use BOTH files together:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from dev compose:
#   - Images pulled from GHCR instead of built locally
#   - No bind-mounted source code
#   - Explicit image tags (set via IMAGE_TAG env var, default: latest)
#   - Resource limits enforced
#   - Grafana admin password from env var (not hardcoded "admin")
#   - Redis password enabled
#   - No dev ports exposed for MongoDB / Redis (only accessible inside network)
# =============================================================================

name: certivault

services:

  # ── MongoDB (production — no external port) ───────────────────────────────
  mongodb:
    image: mongo:7
    ports: []           # do NOT expose MongoDB to host in production
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-certivault}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: certivault
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Redis (production — password-protected, no external port) ─────────────
  redis:
    image: redis:7-alpine
    ports: []           # do NOT expose Redis to host in production
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Backend API (pull from GHCR) ──────────────────────────────────────────
  backend:
    # Built and pushed by the docker-build.yml GitHub Actions workflow
    image: ghcr.io/krishnx21/certivault-backend:${IMAGE_TAG:-latest}
    build: !reset null        # disable local build in prod
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-certivault}:${MONGO_ROOT_PASSWORD}@mongodb:27017/certivault?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 10s

  # ── Workers (pull from GHCR — same image as backend) ─────────────────────
  workers:
    image: ghcr.io/krishnx21/certivault-backend:${IMAGE_TAG:-latest}
    build: !reset null
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-certivault}:${MONGO_ROOT_PASSWORD}@mongodb:27017/certivault?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 10s

  # ── Frontend (pull from GHCR) ─────────────────────────────────────────────
  frontend:
    image: ghcr.io/krishnx21/certivault-frontend:${IMAGE_TAG:-latest}
    build: !reset null   # disable local build in prod — image pulled from GHCR
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 10s

  # ── Prometheus (production retention + resource limits) ────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports: []           # do NOT expose Prometheus to host in production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ── Grafana (secure admin password from env) ──────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
